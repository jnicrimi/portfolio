commit-msg:
  commands:
    commitlint:
      run: commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks git --pre-commit --staged
    markdownlint:
      glob: "*.md"
      run: markdownlint {staged_files}
    yamllint:
      glob: "*.{yml,yaml}"
      run: yamllint --strict {staged_files}
    eslint:
      root: "frontend"
      glob: "*.{js,ts,vue}"
      run: docker compose run --rm nuxt yarn eslint {staged_files}
    prettier:
      root: "frontend"
      glob: "*.{js,ts,vue}"
      run: docker compose run --rm nuxt yarn prettier --check {staged_files}
    hadolint:
      glob: "**/Dockerfile"
      run: hadolint {staged_files}

pre-push:
  commands:
    gitleaks:
      run: gitleaks git --log-opts "origin/main..HEAD"
